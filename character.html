<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Hero | Iron Dash 3000</title>
    <style>
        :root {
            --bg-1: #090b13;
            --bg-2: #121b33;
            --panel: rgba(10, 18, 37, 0.86);
            --line: rgba(161, 203, 255, 0.28);
            --text: #e7ecff;
            --muted: #9eabcf;
            --accent: #41d5ff;
            --accent-strong: #0096d1;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Trebuchet MS, Segoe UI, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 20%, rgba(0, 163, 255, 0.22) 0%, rgba(0, 0, 0, 0) 34%),
                radial-gradient(circle at 88% 8%, rgba(74, 255, 199, 0.16) 0%, rgba(0, 0, 0, 0) 28%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .shell {
            width: min(980px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 24px;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }

        .title {
            margin: 0;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            letter-spacing: 0.04em;
        }

        .subtitle {
            margin-top: 8px;
            color: var(--muted);
            font-size: 1rem;
        }

        .grid {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(3, minmax(150px, 1fr));
            gap: 14px;
        }

        .hero-card {
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0));
            color: var(--text);
            text-align: left;
            cursor: pointer;
            padding: 16px;
            transition: transform 180ms ease, border-color 180ms ease, box-shadow 220ms ease;
        }

        .hero-card:hover {
            transform: translateY(-2px);
            border-color: rgba(65, 213, 255, 0.7);
        }

        .hero-card.is-selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(65, 213, 255, 0.24), 0 10px 24px rgba(0, 122, 174, 0.28);
        }

        .hero-name {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .hero-tag {
            margin: 8px 0 0;
            color: #bcd2ff;
            font-size: 0.9rem;
        }

        .footer {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .selection-text {
            color: var(--muted);
            font-size: 0.96rem;
        }

        .play-btn {
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(90deg, var(--accent), var(--accent-strong));
            color: #00131c;
            cursor: pointer;
            transition: transform 160ms ease, filter 160ms ease;
        }

        .play-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        .play-btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
            filter: none;
        }

        @media (max-width: 760px) {
            .grid {
                grid-template-columns: repeat(2, minmax(140px, 1fr));
            }
        }

        @media (max-width: 460px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <h1 class="title">Choose Your Character</h1>
        <p class="subtitle">Select your Avenger first. The run starts only after your hero is locked in.</p>

        <section class="grid" id="heroGrid">
            <button class="hero-card" data-character="iron-man" data-name="Iron Man" type="button">
                <h2 class="hero-name">Iron Man</h2>
                <p class="hero-tag">Tech genius and flight armor</p>
            </button>
            <button class="hero-card" data-character="captain-america" data-name="Captain America" type="button">
                <h2 class="hero-name">Captain America</h2>
                <p class="hero-tag">Vibranium shield specialist</p>
            </button>
            <button class="hero-card" data-character="hulk" data-name="Hulk" type="button">
                <h2 class="hero-name">Hulk</h2>
                <p class="hero-tag">Gamma strength powerhouse</p>
            </button>
            <button class="hero-card" data-character="thor" data-name="Thor" type="button">
                <h2 class="hero-name">Thor</h2>
                <p class="hero-tag">God of thunder</p>
            </button>
            <button class="hero-card" data-character="black-widow" data-name="Black Widow" type="button">
                <h2 class="hero-name">Black Widow</h2>
                <p class="hero-tag">Elite spy and tactician</p>
            </button>
            <button class="hero-card" data-character="hawkeye" data-name="Hawkeye" type="button">
                <h2 class="hero-name">Hawkeye</h2>
                <p class="hero-tag">Master marksman</p>
            </button>
        </section>

        <div class="footer">
            <p class="selection-text" id="selectionText">No hero selected yet.</p>
            <button class="play-btn" id="playBtn" type="button" disabled>Play</button>
        </div>
    </main>

    <script>
        const cards = Array.from(document.querySelectorAll('.hero-card'));
        const playBtn = document.getElementById('playBtn');
        const selectionText = document.getElementById('selectionText');
        let selectedCharacter = '';
        let selectedName = '';

        function updateSelectionUI() {
            cards.forEach((card) => {
                card.classList.toggle('is-selected', card.dataset.character === selectedCharacter);
            });

            if (selectedCharacter && selectedName) {
                selectionText.innerText = 'Selected: ' + selectedName;
                playBtn.disabled = false;
                playBtn.innerText = 'Play as ' + selectedName;
            } else {
                selectionText.innerText = 'No hero selected yet.';
                playBtn.disabled = true;
                playBtn.innerText = 'Play';
            }
        }

        function selectCharacter(character, name) {
            selectedCharacter = character;
            selectedName = name;
            localStorage.setItem('selectedCharacter', character);
            updateSelectionUI();
        }

        cards.forEach((card) => {
            card.addEventListener('click', () => {
                selectCharacter(card.dataset.character, card.dataset.name);
            });
        });

        playBtn.addEventListener('click', () => {
            if (!selectedCharacter) {
                return;
            }
            window.location.href = 'index.html';
        });

        const previousSelection = localStorage.getItem('selectedCharacter');
        const previousCard = cards.find((card) => card.dataset.character === previousSelection);
        if (previousCard) {
            selectCharacter(previousCard.dataset.character, previousCard.dataset.name);
        } else {
            updateSelectionUI();
        }
    </script>
</body>
</html>
